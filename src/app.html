<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />

		<!-- Primary SEO -->
		<title>Joseph Avila — josephinoo</title>
		<meta name="description" content="Joseph Avila (josephinoo) — Clojure Developer and Data Science / AI Engineer based in Latin America. Building reliable systems and intelligent solutions." />

		<meta name="author" content="Joseph Avila" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://josephinoo.dev" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://josephinoo.dev" />
		<meta property="og:title" content="Joseph Avila — Clojure Dev & AI Engineer" />
		<meta property="og:description" content="Building reliable systems with Clojure, extracting value from data, and crafting intelligent solutions at the intersection of software engineering and machine learning." />
		<meta property="og:image" content="https://josephinoo.dev/og" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Joseph Avila — josephinoo.dev" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:site_name" content="josephinoo.dev" />

		<!-- Twitter / X Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://josephinoo.dev" />
		<meta name="twitter:title" content="Joseph Avila — Clojure Dev & AI Engineer" />
		<meta name="twitter:description" content="Building reliable systems with Clojure, extracting value from data, and crafting intelligent solutions." />
		<meta name="twitter:image" content="https://josephinoo.dev/og" />
		<meta name="twitter:creator" content="@josephinoo" />

		<!-- JSON-LD — Person schema for Google -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Person",
			"name": "Joseph Avila",
			"url": "https://josephinoo.dev",
			"sameAs": [
				"https://github.com/josephinoo",
				"https://linkedin.com/in/josephinoo"
			],
			"jobTitle": "Clojure Developer & AI Engineer",
			"description": "Software engineer specializing in Clojure and Data Science / AI Engineering.",
			"knowsAbout": ["Clojure", "Functional Programming", "Data Science", "Machine Learning", "AI Engineering", "Svelte"]
		}
		</script>

		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
