<!doctype html>
<html lang="en">
		<!-- Preconnect to Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" />
		<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
		<noscript>
			<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		</noscript>

		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon -->
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />

		<!-- Primary SEO -->
		<title>Joseph Avila — josephinoo</title>
		<meta name="description" content="Joseph Avila (josephinoo) — Clojure Developer and Data Science / AI Engineer based in Latin America. Building reliable systems and intelligent solutions." />
		<meta name="keywords" content="Joseph Avila, josephinoo, Clojure developer, data science, AI engineer, functional programming, machine learning, SvelteKit" />
		<meta name="author" content="Joseph Avila" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://josephinoo.dev" />



		<!-- JSON-LD — Person schema for Google -->
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "Person",
			"name": "Joseph Avila",
			"url": "https://josephinoo.dev",
			"sameAs": [
				"https://github.com/josephinoo",
				"https://linkedin.com/in/josephinoo"
			],
			"jobTitle": "Clojure Developer & AI Engineer",
			"description": "Software engineer specializing in Clojure and Data Science / AI Engineering.",
			"knowsAbout": ["Clojure", "Functional Programming", "Data Science", "Machine Learning", "AI Engineering", "Svelte"]
		}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
